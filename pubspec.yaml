name: taskchampion_client_rust
description: "A Flutter/Dart client library for TaskChampion with Rust FFI bindings. Provides task storage, synchronization, and authentication capabilities."
version: 0.1.0
homepage: "https://github.com/Zloooy/taskchampion_client_rust"
repository: "https://github.com/Zloooy/taskchampion_client_rust"
issue_tracker: "https://github.com/Zloooy/taskchampion_client_rust/issues"

# Prevent false positives in secret detection (test keys in transitive dependencies)
false_secrets:
  - rust/target/**

environment:
  sdk: ^3.11.1
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  ffi: ^2.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  uuid: ^4.2.1
  json_annotation: ^4.11.0
  crypto: ^3.0.3
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  freezed: ^3.2.5
  ffigen: ^20.1.1
  native_toolchain_rust: ^1.0.3
  hooks: ^1.0.2
  code_assets: ^1.0.0
  github: ^9.25.0
  archive: ^4.0.0
  http: ^1.1.0

# flutter_rust_bridge configuration
flutter_rust_bridge:
  rust_input: crate::api
  dart_output: lib/src/rust_bridge
  rust_root: rust
  rust_output: rust/src/frb_generated.rs
  dart_entrypoint_class_name: RustLib
  dart_format_line_length: 80

# build_config for native assets hooks
build_config:
  taskchampion_client_rust:
    local_build: false

