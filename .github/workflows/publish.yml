# Workflow for publishing to pub.dev and creating GitHub Release with native assets
# Triggered when a version tag is created (e.g., v0.1.0)
#
# Requirements:
# 1. On pub.dev, enable "Enable publishing from GitHub Actions" in the Admin tab
# 2. Set repository: your-org/taskchampion_client_rust
# 3. Set tag-pattern: v{{version}}
# 4. First publication must be done manually via `dart pub publish`

name: GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Supports tags like v0.1.0, v0.1.0+1, etc.

jobs:
  # ==================== Build & Test ====================
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          cache: true
      
      - name: Verify pubspec.yaml matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          YAML_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "$YAML_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pubspec.yaml version ($YAML_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      - name: Generate FFI bindings
        run: flutter_rust_bridge_codegen generate

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyze
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run Rust tests
        run: |
          cd rust
          cargo test

  # ==================== Build Native Assets ====================
  build-native-assets:
    runs-on: ${{ matrix.os }}
    needs: [build-and-test]
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            artifact_name: android-jni-libs
          - platform: ios
            os: macos-latest
            artifact_name: ios-static-libs
          - platform: macos
            os: macos-latest
            artifact_name: macos-dylib
          - platform: linux
            os: ubuntu-latest
            artifact_name: linux-shared-libs
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      - name: Generate FFI bindings
        run: flutter_rust_bridge_codegen generate

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # Android specific setup
      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26
          add-to-path: true

      - name: Install cargo-ndk
        if: matrix.platform == 'android'
        run: cargo install cargo-ndk

      - name: Add Android targets
        if: matrix.platform == 'android'
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Add iOS targets
        if: matrix.platform == 'ios'
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Add macOS targets
        if: matrix.platform == 'macos'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # Build Android
      - name: Build Android libraries
        if: matrix.platform == 'android'
        run: |
          cd rust
          
          # Build for each ABI separately
          cargo ndk -t arm64-v8a -o ../native-assets-build build --release
          mkdir -p ../native-assets-build
          cp target/aarch64-linux-android/release/libtc_helper.so ../native-assets-build/libtc_helper-android-arm64-v8a.so
          
          cargo ndk -t armeabi-v7a -o ../native-assets-build build --release
          cp target/armv7-linux-androideabi/release/libtc_helper.so ../native-assets-build/libtc_helper-android-armeabi-v7a.so
          
          cargo ndk -t x86_64 -o ../native-assets-build build --release
          cp target/x86_64-linux-android/release/libtc_helper.so ../native-assets-build/libtc_helper-android-x86_64.so
          
      # Build iOS
      - name: Build iOS libraries
        if: matrix.platform == 'ios'
        run: |
          cd rust
          mkdir -p ../native-assets-build

          # Build for device
          cargo build --release --target aarch64-apple-ios
          cp target/aarch64-apple-ios/release/libtc_helper.a ../native-assets-build/libtc_helper-ios-aarch64.a

          # Build for simulator (aarch64)
          cargo build --release --target aarch64-apple-ios-sim
          cp target/aarch64-apple-ios-sim/release/libtc_helper.a ../native-assets-build/libtc_helper-ios-simulator-aarch64.a

          # Build for simulator (x86_64)
          cargo build --release --target x86_64-apple-ios
          cp target/x86_64-apple-ios/release/libtc_helper.a ../native-assets-build/libtc_helper-ios-simulator-x86_64.a

      # Build macOS
      - name: Build macOS libraries
        if: matrix.platform == 'macos'
        run: |
          cd rust
          mkdir -p ../native-assets-build
          
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/libtc_helper.dylib ../native-assets-build/libtc_helper-macos-aarch64.dylib
          
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/libtc_helper.dylib ../native-assets-build/libtc_helper-macos-x86_64.dylib

      # Build Linux
      - name: Build Linux libraries
        if: matrix.platform == 'linux'
        run: |
          cd rust
          mkdir -p ../native-assets-build
          
          cargo build --release
          cp target/release/libtc_helper.so ../native-assets-build/libtc_helper-linux-x86_64.so

      # Upload platform-specific artifacts
      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v7
        with:
          name: android-jni-libs
          path: native-assets-build/libtc_helper-android-*.so
          retention-days: 1

      - name: Upload iOS artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v7
        with:
          name: ios-static-libs
          path: |
            native-assets-build/libtc_helper-ios-aarch64.a
            native-assets-build/libtc_helper-ios-simulator-aarch64.a
            native-assets-build/libtc_helper-ios-simulator-x86_64.a
          retention-days: 1

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: macos-dylib
          path: native-assets-build/libtc_helper-macos-*.dylib
          retention-days: 1

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: linux-shared-libs
          path: native-assets-build/libtc_helper-linux-x86_64.so
          retention-days: 1

  # ==================== Create GitHub Release ====================
  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-native-assets]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v7
        with:
          name: android-jni-libs
          path: native-assets

      - name: Download iOS artifact
        uses: actions/download-artifact@v7
        with:
          name: ios-static-libs
          path: native-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: macos-dylib
          path: native-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-shared-libs
          path: native-assets

      - name: Generate SHA-256 hashes for native assets
        id: generate_hashes
        run: |
          echo "Generating SHA-256 hashes for native assets..."
          cd native-assets
          
          # Generate hashes for all files
          for file in *; do
            if [ -f "$file" ]; then
              hash=$(sha256sum "$file" | awk '{print $1}')
              echo "HASH_$file=$hash" >> $GITHUB_OUTPUT
              echo "  $file: $hash"
            fi
          done
          
          cd ..

      - name: Generate native assets manifest
        run: |
          VERSION="${{ needs.build-and-test.outputs.version }}"
          
          # Create manifests directory
          mkdir -p manifests
          
          # Generate the manifest JSON
          cat > manifests/native_assets.json << EOF
          {
            "version": "$VERSION",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assets": {
              "android-arm64-v8a": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-android-arm64-v8a.so",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-android-arm64-v8a.so }}"
              },
              "android-armeabi-v7a": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-android-armeabi-v7a.so",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-android-armeabi-v7a.so }}"
              },
              "android-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-android-x86_64.so",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-android-x86_64.so }}"
              },
              "android-x86": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-android-x86.so",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-android-x86.so }}"
              },
              "ios-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-ios-aarch64.a",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-ios-aarch64.a }}"
              },
              "ios-simulator-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-ios-simulator-aarch64.a",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-ios-simulator-aarch64.a }}"
              },
              "ios-simulator-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-ios-simulator-x86_64.a",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-ios-simulator-x86_64.a }}"
              },
              "macos-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-macos-aarch64.dylib",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-macos-aarch64.dylib }}"
              },
              "macos-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-macos-x86_64.dylib",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-macos-x86_64.dylib }}"
              },
              "linux-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/libtc_helper-linux-x86_64.so",
                "sha256": "${{ steps.generate_hashes.outputs.HASH_libtc_helper-linux-x86_64.so }}"
              }
            }
          }
          EOF
          
          echo "Generated manifests/native_assets.json:"
          cat manifests/native_assets.json

      - name: Create release archives
        run: |
          # Create native assets archive
          cd native-assets
          zip -r ../taskchampion_client_rust-native-assets-${{ needs.build-and-test.outputs.version }}.zip .
          cd ..

          ls -la *.zip

      - name: Upload native assets to GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            taskchampion_client_rust-native-assets-*.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push manifest
        run: |
          git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/native_assets.json
          git commit -m "chore: update native assets manifest for v${{ needs.build-and-test.outputs.version }}"
          git push origin HEAD:master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}